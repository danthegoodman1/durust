services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: durable
      POSTGRES_PASSWORD: durable
      POSTGRES_DB: durable
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U durable -d durable"]
      interval: 1s
      timeout: 5s
      retries: 30
